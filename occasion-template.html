<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Occasion | Ria Art Jewellery</title>
  <meta name="description" content="Handcrafted jewellery from Ria Art Jewellery, Mumbai.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Ria Art Jewellery">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+SC:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
<main>
  <!-- Hero -->
  <section class="collection-hero">
    <div class="hero-bg">
      <img src="" alt="" loading="eager">
    </div>
    <div class="hero-overlay" style="background:rgba(61,26,18,0.5)"></div>
    <div class="collection-hero-content">
      <p class="hero-micro fade-in fade-in-delay-1" style="color:var(--ria-gold-light)">OCCASION</p>
      <h1 class="collection-hero-title fade-in fade-in-delay-2">Jewellery for Every Celebration</h1>
      <p class="collection-hero-subtitle fade-in fade-in-delay-3"></p>
    </div>
  </section>

  <!-- Products Grid -->
  <section class="section" style="background:var(--ria-bg-primary)">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-label">CURATED EDIT</span>
        <h2 class="section-title" id="occasion-section-title">Jewellery for the Occasion</h2>
      </div>
      <p class="filter-showing text-center" style="margin-bottom:24px;color:var(--ria-text-muted);font-size:.875rem"></p>
      <div class="product-grid" id="occasion-grid"></div>
    </div>
  </section>

  <!-- Styling Tips -->
  <section class="section-sm" id="occasion-tips" style="background:var(--ria-bg-secondary);display:none">
    <div class="container">
      <h2 class="section-title text-center reveal" style="margin-bottom:24px">Styling Tips</h2>
      <div class="trust-card reveal" style="max-width:640px;margin:0 auto">
        <p class="trust-desc" id="occasion-tips-text" style="font-size:.95rem;line-height:1.7"></p>
      </div>
    </div>
  </section>

  <!-- Related Occasions -->
  <section class="section-sm" style="background:var(--ria-bg-primary)">
    <div class="container">
      <h2 class="section-title text-center reveal" style="margin-bottom:28px;font-size:var(--text-heading)">More Occasions</h2>
      <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px" id="related-occasions">
        <a href="/occasions/bridal.html" class="occasion-card" style="flex:0 0 180px;aspect-ratio:3/4">
          <img src="/assets/images/products/bridal-set/bridal set 1N (13495).jpeg" alt="Bridal" loading="lazy">
          <div class="occasion-overlay"><span>Bridal</span></div>
        </a>
        <a href="/occasions/reception.html" class="occasion-card" style="flex:0 0 180px;aspect-ratio:3/4">
          <img src="/assets/images/products/necklace-set/necklace 4N (7795).jpeg" alt="Reception" loading="lazy">
          <div class="occasion-overlay"><span>Reception</span></div>
        </a>
        <a href="/occasions/mehendi.html" class="occasion-card" style="flex:0 0 180px;aspect-ratio:3/4">
          <img src="/assets/images/products/bangles/bangles 2N (9285).jpeg" alt="Mehendi" loading="lazy">
          <div class="occasion-overlay"><span>Mehendi</span></div>
        </a>
        <a href="/occasions/sangeet.html" class="occasion-card" style="flex:0 0 180px;aspect-ratio:3/4">
          <img src="/assets/images/products/ear-rings/ear ring 1 (2795).jpeg" alt="Sangeet" loading="lazy">
          <div class="occasion-overlay"><span>Sangeet</span></div>
        </a>
        <a href="/occasions/festive.html" class="occasion-card" style="flex:0 0 180px;aspect-ratio:3/4">
          <img src="/assets/images/products/choker/choker 2N (5695).jpeg" alt="Festive" loading="lazy">
          <div class="occasion-overlay"><span>Festive</span></div>
        </a>
        <a href="/occasions/party-wear.html" class="occasion-card" style="flex:0 0 180px;aspect-ratio:3/4">
          <img src="/assets/images/products/western-jewellery/western jewellery 1 (2795).jpeg" alt="Party Wear" loading="lazy">
          <div class="occasion-overlay"><span>Party Wear</span></div>
        </a>
      </div>
    </div>
  </section>
</main>

<script src="/assets/js/products-data.js"></script>
<script src="/assets/js/components.js"></script>
<script src="/assets/js/whatsapp.js"></script>
<script src="/assets/js/vault.js"></script>
<script src="/assets/js/search.js"></script>
<script src="/assets/js/main.js"></script>
<script src="/assets/js/occasion-page.js"></script>
</body>
</html>
